name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: |
      (github.event_name == 'pull_request_target' && github.event.action != 'closed')
      || (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
      || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, 'I have read the CLA'))
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          path-to-signatures: "signatures/version1/cla.json"
          branch: "cla-signatures"
          allowlist: "SeriousBug,dependabot[bot],renovate[bot]"
          remote-organization-name: ""
          remote-repository-name: ""
          lock-pullrequest-aftermerge: false
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, we need you to agree to our [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            To agree, please comment on this PR with the following exact text:

            > I have read the CLA Document and I hereby sign the CLA.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA."
          custom-allsigned-prcomment: "All contributors have signed the CLA. Thank you!"
